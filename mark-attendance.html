<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      padding: 30px;
      margin-top: 30px;
      background: linear-gradient(135deg, #ffffff, #e9f0ff);
    }

    h2 {
      text-align: center;
      color: #0d6efd;
      margin-bottom: 30px;
      font-weight: 700;
    }

    .table thead {
      background: linear-gradient(90deg, #0d6efd, #6c63ff);
      color: #fff;
      border-radius: 10px;
    }

    .table-striped tbody tr:nth-of-type(odd) {
      background-color: rgba(13,110,253,0.05);
    }

    .table-hover tbody tr:hover {
      background-color: rgba(13,110,253,0.1);
    }

    input.form-control {
      border-radius: 12px;
    }

    .btn-success {
      border-radius: 12px;
      font-weight: 500;
      width: 100%;
      transition: 0.3s;
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .alert {
      border-radius: 12px;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container my-5">
  <div class="card">
    <h2><i class="bi bi-pencil-square me-2"></i>Mark Attendance</h2>
    <div class="mb-3">
      <label class="form-label fw-semibold">Select Date</label>
      <input type="date" id="attendanceDate" class="form-control">
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Class</th>
            <th>Section</th>
            <th>Present</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
    </div>

    <button class="btn btn-success mt-3" id="saveAttendance">Save Attendance</button>
    <div id="successMsg" class="alert alert-success mt-3 d-none">Attendance saved!</div>
  </div>
</div>

<script>
const studentTableBody = document.getElementById('studentTableBody');
const attendanceDate = document.getElementById('attendanceDate');
const saveAttendance = document.getElementById('saveAttendance');
const successMsg = document.getElementById('successMsg');

attendanceDate.valueAsDate = new Date();
let students = JSON.parse(localStorage.getItem('students')) || [];

function loadStudents() {
    studentTableBody.innerHTML = '';
    students.forEach((student, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${index+1}</td>
            <td>${student.name}</td>
            <td>${student.roll}</td>
            <td>${student.class}</td>
            <td>${student.section}</td>
            <td>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="present-${index}" checked>
                </div>
            </td>
        `;
        studentTableBody.appendChild(row);
    });
}

loadStudents();

saveAttendance.addEventListener('click', () => {
    const date = attendanceDate.value;
    if(!date) return alert("Please select a date!");
    let attendanceRecords = JSON.parse(localStorage.getItem('attendance')) || [];

    students.forEach((student, index) => {
        const isPresent = document.getElementById(`present-${index}`).checked;
        attendanceRecords.push({
            date: date,
            roll: student.roll,
            name: student.name,
            class: student.class,
            section: student.section,
            status: isPresent ? 'Present' : 'Absent'
        });
    });

    localStorage.setItem('attendance', JSON.stringify(attendanceRecords));
    successMsg.classList.remove('d-none');
    setTimeout(() => successMsg.classList.add('d-none'), 3000);
});
</script>

</body>
</html>
