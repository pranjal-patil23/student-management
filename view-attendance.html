<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
    }

    /* Global headings outside cards */
    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      color: #0d6efd;
    }

    /* Summary Cards */
    .summary-card {
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .summary-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    /* Numbers inside summary cards */
    .summary-card h2 {
      color: inherit; /* inherits card color */
      font-size: 2.5rem;
      margin: 0;
    }

    /* Gradient cards with text colors */
    .gradient-blue { background: linear-gradient(90deg, #0d6efd, #6c63ff); color: #fff; }
    .gradient-green { background: linear-gradient(90deg, #28a745, #20c997); color: #fff; }
    .gradient-red { background: linear-gradient(90deg, #dc3545, #ff6b6b); color: #fff; }
    .gradient-yellow { background: linear-gradient(90deg, #ffc107, #ffca2c); color: #000; }

    /* Attendance table */
    .table thead {
      background: linear-gradient(90deg, #0d6efd, #6c63ff);
      color: #fff;
      border-radius: 10px;
    }
    .table-striped tbody tr:nth-of-type(odd) {
      background-color: rgba(13,110,253,0.05);
    }
    .table-hover tbody tr:hover {
      background-color: rgba(13,110,253,0.1);
    }

    .badge {
      font-weight: 500;
      font-size: 0.9rem;
    }

    input.form-control {
      border-radius: 12px;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      padding: 30px;
      margin-top: 30px;
    }

  </style>
</head>
<body>

<div class="container my-5">

  <!-- Summary Cards -->
  <div class="row g-4 mb-4">
    <div class="col-md-3">
      <div class="summary-card gradient-blue">
        <h5>Total Students</h5>
        <h2 id="totalStudents">0</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card gradient-green">
        <h5>Present Today</h5>
        <h2 id="presentToday">0</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card gradient-red">
        <h5>Absent Today</h5>
        <h2 id="absentToday">0</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card gradient-yellow">
        <h5>Attendance %</h5>
        <h2 id="attendancePercent">0%</h2>
      </div>
    </div>
  </div>

  <!-- Attendance Table Card -->
  <div class="card">
    <h2><i class="bi bi-card-checklist me-2"></i>View Attendance</h2>

    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <input type="date" id="filterDate" class="form-control" placeholder="Filter by date">
      </div>
      <div class="col-md-6">
        <input type="text" id="filterStudent" class="form-control" placeholder="Filter by student name">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Class</th>
            <th>Section</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const attendanceTableBody = document.getElementById('attendanceTableBody');
const filterDate = document.getElementById('filterDate');
const filterStudent = document.getElementById('filterStudent');

function loadAttendance() {
    const attendance = JSON.parse(localStorage.getItem('attendance')) || [];
    const dateFilter = filterDate.value;
    const nameFilter = filterStudent.value.toLowerCase();

    attendanceTableBody.innerHTML = '';

    const filtered = attendance.filter(record => {
        const matchesDate = dateFilter ? record.date === dateFilter : true;
        const matchesName = record.name.toLowerCase().includes(nameFilter);
        return matchesDate && matchesName;
    });

    let total = filtered.length;
    let presentCount = filtered.filter(r => r.status === 'Present').length;
    let absentCount = total - presentCount;
    let percent = total > 0 ? Math.round((presentCount / total) * 100) : 0;

    // Update summary cards
    document.getElementById('totalStudents').innerText = total;
    document.getElementById('presentToday').innerText = presentCount;
    document.getElementById('absentToday').innerText = absentCount;
    document.getElementById('attendancePercent').innerText = percent + '%';

    filtered.forEach((record, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${record.date}</td>
            <td>${record.name}</td>
            <td>${record.roll}</td>
            <td>${record.class}</td>
            <td>${record.section}</td>
            <td>
                <span class="badge ${record.status === 'Present' ? 'bg-success' : 'bg-danger'}">
                    ${record.status}
                </span>
            </td>
        `;
        attendanceTableBody.appendChild(row);
    });
}

// Initial load
loadAttendance();

// Filters
filterDate.addEventListener('change', loadAttendance);
filterStudent.addEventListener('input', loadAttendance);
</script>

</body>
</html>
