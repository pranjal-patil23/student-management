<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
  <h2 class="mb-4">Manage Students</h2>

  <!-- Add Student Form -->
  <form id="addStudentForm" class="mb-4">
    <div class="row g-3">
      <div class="col-md-3">
        <input type="text" class="form-control" id="studentName" placeholder="Name" required>
      </div>
      <div class="col-md-2">
        <input type="text" class="form-control" id="studentRoll" placeholder="Roll No" required>
      </div>
      <div class="col-md-2">
        <input type="text" class="form-control" id="studentClass" placeholder="Class" required>
      </div>
      <div class="col-md-2">
        <input type="text" class="form-control" id="studentSection" placeholder="Section" required>
      </div>
      <div class="col-md-3">
        <button type="submit" class="btn btn-primary w-100">Add Student</button>
      </div>
    </div>
  </form>

  <!-- Student Table -->
  <table class="table table-striped">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Roll</th>
        <th>Class</th>
        <th>Section</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTableBody"></tbody>
  </table>
</div>

<script>
const addStudentForm = document.getElementById('addStudentForm');
const studentNameInput = document.getElementById('studentName');
const studentRollInput = document.getElementById('studentRoll');
const studentClassInput = document.getElementById('studentClass');
const studentSectionInput = document.getElementById('studentSection');
const studentTableBody = document.getElementById('studentTableBody');

let students = JSON.parse(localStorage.getItem('students')) || [];
let attendance = JSON.parse(localStorage.getItem('attendance')) || [];

// Add student
addStudentForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = studentNameInput.value.trim();
    const roll = studentRollInput.value.trim();
    const className = studentClassInput.value.trim();
    const section = studentSectionInput.value.trim();

    if(!name || !roll || !className || !section){
        alert('Please fill all fields!');
        return;
    }

    students.push({ name, roll, class: className, section });
    localStorage.setItem('students', JSON.stringify(students));
    addStudentForm.reset();
    loadStudents();
    updateDashboard();
});

// Load students table
function loadStudents(){
    studentTableBody.innerHTML = '';
    students.forEach((student, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${student.name}</td>
            <td>${student.roll}</td>
            <td>${student.class}</td>
            <td>${student.section}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteStudent(${index})">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </td>
        `;
        studentTableBody.appendChild(row);
    });
}

// Delete student
function deleteStudent(index){
    const studentName = students[index].name;
    const studentRoll = students[index].roll;
    if(confirm(`Are you sure you want to delete ${studentName} and all their attendance records?`)){
        students.splice(index, 1);
        localStorage.setItem('students', JSON.stringify(students));

        // Remove attendance records of this student
        attendance = attendance.filter(record => record.roll !== studentRoll);
        localStorage.setItem('attendance', JSON.stringify(attendance));

        loadStudents();
        updateDashboard();
        alert(`${studentName} and their attendance records have been deleted.`);
    }
}

// Update dashboard numbers
function updateDashboard(){
    const totalStudentsEl = document.getElementById('total-students');
    const presentTodayEl = document.getElementById('present-today');
    const absentTodayEl = document.getElementById('absent-today');
    const attendancePercentEl = document.getElementById('attendance-percent');

    if(!totalStudentsEl) return; // if dashboard elements not present

    const today = new Date().toISOString().split('T')[0];
    const todayRecords = attendance.filter(a => a.date === today);
    const presentCount = todayRecords.filter(a => a.status === 'Present').length;
    const absentCount = todayRecords.filter(a => a.status === 'Absent').length;
    const total = students.length;
    const percent = total > 0 ? Math.round((presentCount / total) * 100) : 0;

    totalStudentsEl.textContent = total;
    presentTodayEl.textContent = presentCount;
    absentTodayEl.textContent = absentCount;
    attendancePercentEl.textContent = percent + '%';
}

// Initial load
loadStudents();
updateDashboard();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
